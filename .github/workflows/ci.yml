name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# A newer push supersedes an in-flight run on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Makes the CLI take defaults instead of prompting (it detects non-TTY too,
  # but being explicit means a local `CI=1` reproduces the pipeline exactly).
  CI: "true"

jobs:
  cli:
    name: CLI (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  template:
    name: Template
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: templates/app/package-lock.json
      - run: npm ci

      # The template is a real app and is held to the same bar it asks of
      # generated projects — if it can't pass, nothing scaffolded from it will.
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm test
      - run: npm run build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('templates/app/package-lock.json') }}

      - run: npx playwright install --with-deps chromium
      - name: Sweep
        run: npx playwright test --project=chromium

      - name: Upload sweep artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sweep-report
          path: |
            templates/app/test-results/
            templates/app/playwright-report/
          retention-days: 7

  create:
    name: create → verify (${{ matrix.scenario }})
    runs-on: ubuntu-latest
    # The gate that actually matters: does a SCAFFOLDED project compile, lint,
    # test and build? Both real bugs found in M1 were only visible here.
    strategy:
      fail-fast: false
      matrix:
        scenario: [minimal, multi-role]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: node scripts/verify-create.mjs ${{ matrix.scenario }}

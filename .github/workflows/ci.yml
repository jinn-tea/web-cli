name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# A newer push supersedes an in-flight run on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Makes the CLI take defaults instead of prompting (it detects non-TTY too,
  # but being explicit means a local `CI=1` reproduces the pipeline exactly).
  CI: "true"

jobs:
  cli:
    name: CLI (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Node 20 is NOT supported: commander requires >=22.12 and execa >=22.
        # Testing a version our dependencies exclude only produces red builds.
        node: ["22", "24"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: package-lock.json
      # `npm install`, not `npm ci`. Both honour the lockfile, but `ci` demands
      # it describe the install target EXACTLY — and a lockfile written on
      # macOS/arm64 doesn't always carry every Linux optional binary, so it
      # aborts on the runner while working perfectly on the machine that wrote
      # it. `install` reconciles that instead of failing.
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  template:
    name: Template
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: templates/app/package-lock.json
      # `npm install`, not `npm ci`. Both honour the lockfile, but `ci` demands
      # it describe the install target EXACTLY — and a lockfile written on
      # macOS/arm64 doesn't always carry every Linux optional binary, so it
      # aborts on the runner while working perfectly on the machine that wrote
      # it. `install` reconciles that instead of failing.
      - run: npm install --no-audit --no-fund

      # The template is a real app and is held to the same bar it asks of
      # generated projects — if it can't pass, nothing scaffolded from it will.
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm test
      - run: npm run build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('templates/app/package-lock.json') }}

      - run: npx playwright install --with-deps chromium
      - name: Sweep
        run: npx playwright test --project=chromium

      - name: Upload sweep artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sweep-report
          path: |
            templates/app/test-results/
            templates/app/playwright-report/
          retention-days: 7

  create:
    name: create → verify (${{ matrix.scenario }})
    runs-on: ubuntu-latest
    # The gate that actually matters: does a SCAFFOLDED project compile, lint,
    # test and build? Both real bugs found in M1 were only visible here.
    strategy:
      fail-fast: false
      matrix:
        scenario: [minimal, roleless, multi-role]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json
      # `npm install`, not `npm ci`. Both honour the lockfile, but `ci` demands
      # it describe the install target EXACTLY — and a lockfile written on
      # macOS/arm64 doesn't always carry every Linux optional binary, so it
      # aborts on the runner while working perfectly on the machine that wrote
      # it. `install` reconciles that instead of failing.
      - run: npm install --no-audit --no-fund
      - run: node scripts/verify-create.mjs ${{ matrix.scenario }}

  roundtrip:
    name: domain → remove-domain is exact
    runs-on: ubuntu-latest
    # Hashes the whole source tree before and after, so a registry the removal
    # forgets to unwire is caught even though nobody wrote an assertion for it.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json
      # `npm install`, not `npm ci`. Both honour the lockfile, but `ci` demands
      # it describe the install target EXACTLY — and a lockfile written on
      # macOS/arm64 doesn't always carry every Linux optional binary, so it
      # aborts on the runner while working perfectly on the machine that wrote
      # it. `install` reconciles that instead of failing.
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - run: node scripts/verify-roundtrip.mjs

  doctor:
    name: doctor catches seeded breakage
    runs-on: ubuntu-latest
    # Breaks each invariant in turn and asserts the right check fires. A health
    # check that never fails is indistinguishable from one that doesn't work.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json
      # `npm install`, not `npm ci`. Both honour the lockfile, but `ci` demands
      # it describe the install target EXACTLY — and a lockfile written on
      # macOS/arm64 doesn't always carry every Linux optional binary, so it
      # aborts on the runner while working perfectly on the machine that wrote
      # it. `install` reconciles that instead of failing.
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - run: node scripts/verify-doctor.mjs

  migration:
    name: roleless → role-first migration
    runs-on: ubuntu-latest
    # The most intricate path in the CLI, and the one where a failure would
    # leave someone's tree half-moved. Covers the happy path AND the rollback.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - run: node scripts/verify-migration.mjs
